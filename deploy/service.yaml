apiVersion: v1
kind: Service
metadata:
  name: personal-buffett
  labels:
    cloud.sealos.io/app-deploy-manager: personal-buffett
spec:
  selector:
    app: personal-buffett
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: personal-buffett-data
  labels:
    cloud.sealos.io/app-deploy-manager: personal-buffett
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: personal-buffett
  labels:
    cloud.sealos.io/app-deploy-manager: personal-buffett
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: personal-buffett
                port:
                  number: 8080
