apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-buffett
  labels:
    app: personal-buffett
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-buffett
  template:
    metadata:
      labels:
        app: personal-buffett
    spec:
      containers:
        - name: personal-buffett
          image: ghcr.io/sodawaitress/personal-buffett:main
          ports:
            - containerPort: 8080
          env:
            - name: FLASK_SECRET_KEY
              value: "50055a939bfd66563448e1bbeaf6e30c65de30574d2e189b02aecba30b4a5de0"
            - name: GROQ_API_KEY
              value: "REPLACE_WITH_GROQ_KEY"
            - name: RADAR_DB_PATH
              value: "/data/radar.db"
            - name: FLASK_DEBUG
              value: "0"
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: personal-buffett-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: personal-buffett-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: personal-buffett
spec:
  selector:
    app: personal-buffett
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: personal-buffett
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: personal-buffett
                port:
                  number: 8080
