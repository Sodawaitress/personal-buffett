{% extends 'base.html' %}
{% block title %}Report {{ report.date }} — Personal Buffett{% endblock %}

{% block content %}
<div class="container py-4">

  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
<h5 class="mb-0 fw-bold"><i class="bi bi-file-earmark-text me-2 text-gold"></i>{{ report.date }} Daily Report</h5>
    <a href="{{ url_for('accuracy') }}" class="btn btn-sm btn-outline-secondary ms-auto" title="预测准确率追踪">
      <i class="bi bi-graph-up-arrow me-1"></i>准确率
    </a>
    <small class="text-muted">{{ now }} CST</small>
  </div>

  <!-- Date navigation -->
  {% if reports %}
  <div class="d-flex gap-2 flex-wrap mb-4">
    {% for r in reports %}
    <a href="{{ url_for('report', date=r.date) }}"
       class="btn btn-sm {% if r.date == report.date %}btn-gold{% else %}btn-outline-secondary{% endif %}">
      {{ r.date }}
    </a>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Report body -->
  <div class="report-body">
    <div id="md-render"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  document.getElementById('md-render').innerHTML = marked.parse({{ report.md | tojson }});
</script>
{% endblock %}
