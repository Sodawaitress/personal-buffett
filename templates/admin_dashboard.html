{% extends 'base.html' %}
{% block title %}管理后台{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:860px">

  <h2 class="fw-bold mb-4"><i class="bi bi-speedometer2 me-2"></i>管理后台</h2>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="add-card p-3 text-center">
        <div style="font-size:1.8rem;font-weight:700">{{ users|length }}</div>
        <div class="text-muted small">用户总数</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="add-card p-3 text-center">
        <div style="font-size:1.8rem;font-weight:700">{{ users|selectattr('push.notify_daily')|list|length }}</div>
        <div class="text-muted small">已开推送</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="add-card p-3 text-center">
        <div style="font-size:1.8rem;font-weight:700">{{ questions_count }}</div>
        <div class="text-muted small">今日提问</div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <a href="{{ url_for('admin_users') }}" class="add-card p-3 d-flex align-items-center gap-3 text-decoration-none text-body">
        <i class="bi bi-people fs-4"></i>
        <div>
          <div class="fw-semibold">用户管理</div>
          <div class="text-muted small">查看 / 推送设置</div>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('admin_questions') }}" class="add-card p-3 d-flex align-items-center gap-3 text-decoration-none text-body">
        <i class="bi bi-chat-left-text fs-4"></i>
        <div>
          <div class="fw-semibold">提问记录</div>
          <div class="text-muted small">所有用户的 AI 问答</div>
        </div>
      </a>
    </div>
  </div>

</div>
{% endblock %}
